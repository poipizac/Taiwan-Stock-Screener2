name: Daily Stock Update

# 設定觸發條件
on:
  schedule:
    # 台灣時間 18:00 (UTC 10:00) 執行
    - cron: '0 10 * * *'
  
  workflow_dispatch: 

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run 10x Stock Scraper
        run: python update_data.py

      - name: Run Momentum Screener
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python momentum_screener_final.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # 加入所有更新後的 JSON 檔案
          git add stock_data.json momentum_data.json
          git commit -m "🤖 Auto-update daily stock data [Cloud Run]" || echo "No changes to commit"
          git push