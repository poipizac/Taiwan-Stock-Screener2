name: Daily Stock Update

# 設定觸發條件
on:
  schedule:
    # 這是 UTC 時間的 07:30，也就是台灣時間 (UTC+8) 的 15:30
    # 1-5 代表週一到週五執行
    - cron: '30 7 * * 1-5'
  
  # 允許你隨時在 GitHub 網頁上手動點擊按鈕執行
  workflow_dispatch: 

jobs:
  update-data:
    runs-on: ubuntu-latest # 使用 GitHub 免費提供的 Linux 機器

    steps:
      # 1. 把你的程式碼抓到雲端機器上
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 安裝 Python 環境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. 根據你的 requirements.txt 安裝套件 (yfinance, pandas)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. 執行你的爬蟲腳本！
      - name: Run Scraper
        run: python update_data.py

      # 5. 把更新後的 JSON 存檔並推回你的 GitHub 倉庫
      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # 只將有變動的 json 檔加入
          git add stock_data.json
          # 如果資料有更新就 commit，沒更新就略過不報錯
          git commit -m "🤖 Auto-update daily stock data" || echo "No changes to commit"
          git push